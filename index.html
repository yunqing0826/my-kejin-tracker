<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>課金追蹤器 V8.0</title>
    <style>
        /* 絢爛科技風背景 */
        body { 
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 50px 20px; 
            background: radial-gradient(circle at center, #350000 0%, #000000 100%); 
            color: #ffffff;
            min-height: 100vh;
            line-height: 1.6;
        }

        .card { 
            background: rgba(15, 15, 15, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4), inset 0 0 15px rgba(255, 0, 0, 0.2); 
            border: 2px solid #800;
            margin-bottom: 30px;
        }

        h2 { 
            text-align: center; 
            color: #ff3333; 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            margin-top: 0;
            font-size: 32px;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.7);
        }

        .total-section { 
            font-size: 42px; 
            color: #ff4d4d; 
            text-align: center;
            font-weight: 900; 
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
        }

        .status-msg { 
            text-align: center;
            font-size: 20px; 
            font-style: italic; 
            margin-bottom: 40px; 
            min-height: 35px;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .input-group { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px; 
            margin-bottom: 35px; 
            background: rgba(255, 255, 255, 0.07);
            padding: 30px;
            border-radius: 12px;
            border: 1px dashed #555;
        }

        .full-width { grid-column: span 2; }

        label { font-size: 16px; color: #ccc; margin-bottom: 8px; display: block; font-weight: bold; }
        
        input, select { 
            background: #111; 
            border: 1px solid #666; 
            color: white; 
            padding: 15px; 
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            color-scheme: dark;
        }

        .btn-add { 
            background: linear-gradient(45deg, #a00000, #ff0000); 
            color: white; 
            border: none; 
            padding: 18px; 
            font-size: 20px;
            font-weight: bold;
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-add:hover { 
            background: linear-gradient(45deg, #ff0000, #ff5555); 
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.8);
            transform: translateY(-2px);
        }

        /* 統計區塊 */
        .stats-panel {
            background: rgba(30, 0, 0, 0.6);
            border: 1px solid #500;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }
        .stats-title {
            color: #ffcc00;
            font-size: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #ffcc00;
            padding-left: 10px;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border-bottom: 2px solid #a00;
            text-align: center;
        }

        /* 分頁控制樣式 */
        .pagination-ctrl {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px; /* 移到最底後的間距 */
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid #333;
        }
        .btn-page {
            background: #444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-page:disabled { background: #222; color: #555; cursor: not-allowed; }
        .btn-page:not(:disabled):hover { background: #ff3333; box-shadow: 0 0 10px #ff3333; }
        #pageInfo { font-family: 'Courier New', monospace; color: #00ffcc; font-weight: bold; }

        .btn-delete {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-delete:hover { background: #ff4d4d; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background-color: #500; color: #ffcccc; padding: 18px; text-align: left; border-bottom: 2px solid #ff3333; }
        td { border-bottom: 1px solid #333; padding: 18px; color: #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>課金監測終端 V8.0</h2>
    <div class="total-section">累計金額：$<span id="totalAmount">0</span></div>
    <div id="statusMsg" class="status-msg">系統就緒...等待掃描消費紀錄...</div>

    <div class="input-group">
        <div>
            <label>📅 紀錄日期：</label>
            <input type="date" id="dateInput">
        </div>
        <div>
            <label>📡 消費管道：</label>
            <select id="channel">
                <option value="App Store">App Store</option>
                <option value="Google Play">Google Play</option>
                <option value="MyCard">MyCard</option>
                <option value="信用卡直儲">信用卡直儲</option>
                <option value="其他管道">其他管道</option>
            </select>
        </div>
        <div class="full-width">
            <label>📝 項目名稱：</label>
            <input type="text" id="itemName" placeholder="例如：月卡、首儲雙倍、聖誕禮包">
        </div>
        <div class="full-width">
            <label>💰 單筆金額 (TWD)：</label>
            <input type="number" id="amount" placeholder="請輸入金額" min="0">
        </div>
        <button class="full-width btn-add" onclick="addRecord()">確認登錄資料</button>
    </div>

    <div class="stats-panel" id="statsPanel" style="display: none;">
        <div class="stats-title">📊 數據分析：按月統計</div>
        <div class="stats-grid" id="statsGrid"></div>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>日期</th>
                <th>花費項目</th>
                <th>來源渠道</th>
                <th>金額</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="pagination-ctrl" id="paginationBox" style="display: none;">
        <button class="btn-page" id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
        <span id="pageInfo">頁次: 1 / 1</span>
        <button class="btn-page" id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
</div>

<script>
    let records = []; 
    let currentPage = 1;
    const recordsPerPage = 30;

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;

        const savedData = localStorage.getItem('kejin_records');
        if (savedData) {
            try {
                records = JSON.parse(savedData);
                refreshUI();
            } catch (e) {
                records = [];
            }
        }
    };

    function updateStatus(total) {
        const msgElement = document.getElementById('statusMsg');
        if (total === 0) {
            msgElement.innerText = "系統就緒...等待掃描消費紀錄...";
            msgElement.style.color = "#00ffcc";
        } else if (total < 2000) {
            msgElement.innerText = "✨ 小課怡情 不痛不癢";
            msgElement.style.color = "#00ffcc";
        } else if (total < 10000) {
            msgElement.innerText = "💳 為愛發電 小額贊助";
            msgElement.style.color = "#3399ff";
        } else if (total < 50000) {
            msgElement.innerText = "💸 愛情來了 錢包扁了";
            msgElement.style.color = "#ff9900";
        } else if (total < 88000) {
            msgElement.innerText = "🫶 嫁妝已備 等他入贅";
            msgElement.style.color = "#f1c40f";
        } else {
            msgElement.innerText = "💓 這輩子就栽在他手裡了";
            msgElement.style.color = "#ff0000";
            msgElement.style.textShadow = "0 0 10px rgba(255,0,0,0.5)";
        }
    }

    function addRecord() {
        const date = document.getElementById('dateInput').value;
        const channel = document.getElementById('channel').value;
        const itemName = document.getElementById('itemName').value || "未命名項目";
        const amount = parseFloat(document.getElementById('amount').value);

        if (!date || isNaN(amount) || amount <= 0) {
            alert("⚠️ 請輸入正確的日期與金額！");
            return;
        }

        const record = { id: Date.now(), date, itemName, channel, amount };
        records.push(record);
        
        currentPage = 1; 
        saveData();
        refreshUI();

        document.getElementById('itemName').value = "";
        document.getElementById('amount').value = "";
    }

    function deleteRecord(id) {
        if(confirm("確定要刪除這筆紀錄嗎？")) {
            records = records.filter(r => r.id !== id);
            const maxPage = Math.ceil(records.length / recordsPerPage) || 1;
            if (currentPage > maxPage) currentPage = maxPage;
            saveData();
            refreshUI();
        }
    }

    function saveData() {
        localStorage.setItem('kejin_records', JSON.stringify(records));
    }

    function changePage(step) {
        currentPage += step;
        refreshUI();
        // 切換頁面後自動捲動回表格頂端，方便閱讀
        document.getElementById('recordTable').scrollIntoView({ behavior: 'smooth' });
    }

    function refreshUI() {
        const tableBody = document.querySelector('#recordTable tbody');
        const statsGrid = document.getElementById('statsGrid');
        const statsPanel = document.getElementById('statsPanel');
        const paginationBox = document.getElementById('paginationBox');
        
        tableBody.innerHTML = "";
        
        let total = 0;
        let monthlyData = {};
        records.forEach(r => {
            total += r.amount;
            const monthKey = r.date.substring(0, 7);
            monthlyData[monthKey] = (monthlyData[monthKey] || 0) + r.amount;
        });

        const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
        const totalPages = Math.ceil(sortedRecords.length / recordsPerPage) || 1;
        const startIndex = (currentPage - 1) * recordsPerPage;
        const pageRecords = sortedRecords.slice(startIndex, startIndex + recordsPerPage);

        pageRecords.forEach(r => {
            const row = tableBody.insertRow();
            row.insertCell(0).innerText = r.date;
            row.insertCell(1).innerText = r.itemName;
            row.insertCell(2).innerText = r.channel;
            row.insertCell(3).innerText = `$${r.amount.toLocaleString()}`;
            const delCell = row.insertCell(4);
            delCell.innerHTML = `<button class="btn-delete" onclick="deleteRecord(${r.id})">刪除</button>`;
        });

        document.getElementById('totalAmount').innerText = total.toLocaleString();
        updateStatus(total);

        const months = Object.keys(monthlyData).sort().reverse();
        if (months.length > 0) {
            statsPanel.style.display = "block";
            statsGrid.innerHTML = months.map(m => `
                <div class="stat-item">
                    <div class="stat-month">${m}</div>
                    <div class="stat-value">$${monthlyData[m].toLocaleString()}</div>
                </div>
            `).join('');
        } else {
            statsPanel.style.display = "none";
        }

        if (records.length > recordsPerPage) {
            paginationBox.style.display = "flex";
            document.getElementById('pageInfo').innerText = `頁次: ${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (currentPage === totalPages);
        } else {
            paginationBox.style.display = "none";
        }
    }
</script>

</body>
</html>
