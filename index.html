<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課金監測終端 V11.0 - 數據分析版</title>
    <style>
        body { font-family: 'Segoe UI', 'PingFang TC', sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: radial-gradient(circle at center, #350000 0%, #000000 100%); color: #ffffff; min-height: 100vh; }
        .card { background: rgba(15, 15, 15, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); border: 2px solid #800; margin-bottom: 30px; }
        h2 { text-align: center; color: #ff3333; letter-spacing: 3px; font-size: 26px; text-transform: uppercase; }
        
        .total-section { font-size: 38px; color: #ff4d4d; text-align: center; font-weight: 900; text-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .status-msg { text-align: center; font-size: 18px; margin-bottom: 30px; font-weight: bold; min-height: 35px; }

        /* 統計面板樣式 */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stats-box { background: rgba(50, 0, 0, 0.4); border: 1px solid #600; border-radius: 12px; padding: 15px; }
        .stats-title { color: #ffcc00; font-size: 16px; margin-bottom: 10px; border-left: 4px solid #ffcc00; padding-left: 8px; font-weight: bold; }
        .stats-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .stat-tag { background: rgba(255, 255, 255, 0.1); padding: 5px 10px; border-radius: 5px; font-size: 13px; border-bottom: 2px solid #a00; flex: 1 1 calc(50% - 10px); min-width: 100px; text-align: center; }
        .stat-tag span { display: block; font-weight: bold; color: #fff; }
        .stat-label { font-size: 11px; color: #aaa; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background: rgba(255, 255, 255, 0.07); padding: 20px; border-radius: 12px; border: 1px dashed #444; }
        @media (max-width: 600px) { 
            .input-group, .stats-container { grid-template-columns: 1fr; } 
            .full-width { grid-column: span 1; }
        }
        .full-width { grid-column: span 2; }
        input, select { background: #111; border: 1px solid #666; color: white; padding: 12px; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; color-scheme: dark; }
        .btn-add { background: linear-gradient(45deg, #a00000, #ff0000); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; transition: 0.3s; }
        .btn-add:hover { box-shadow: 0 0 15px #f00; transform: translateY(-2px); }

        /* 表格樣式 */
        .table-wrap { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background-color: #500; color: #ffcccc; padding: 12px; text-align: left; border-bottom: 2px solid #f00; }
        td { border-bottom: 1px solid #333; padding: 12px; font-size: 14px; }
        .btn-delete { color: #ff4d4d; background: none; border: 1px solid #ff4d4d; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .backup-zone { margin-top: 40px; padding-top: 20px; border-top: 1px solid #444; display: flex; gap: 10px; justify-content: center; }
        .btn-backup { background: #222; color: #888; border: 1px solid #444; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 13px; }
        
        /* 分頁 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 10px; }
        .btn-page { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>課金監測終端 V11.0</h2>
    <div class="total-section">累計金額：$<span id="totalAmount">0</span></div>
    <div id="statusMsg" class="status-msg">掃描紀錄中...</div>

    <div class="stats-container">
        <div class="stats-box">
            <div class="stats-title">📊 年度統計</div>
            <div id="yearStats" class="stats-list"></div>
        </div>
        <div class="stats-box">
            <div class="stats-title">📅 月度統計</div>
            <div id="monthStats" class="stats-list"></div>
        </div>
    </div>

    <div class="input-group">
        <div><label>📅 紀錄日期：</label><input type="date" id="dateInput"></div>
        <div><label>📡 消費管道：</label>
            <select id="channel">
                <option value="App Store">App Store</option>
                <option value="Google Play">Google Play</option>
                <option value="MyCard">MyCard</option>
                <option value="信用卡直儲">信用卡直儲</option>
                <option value="其他管道">其他管道</option>
            </select>
        </div>
        <div class="full-width"><label>📝 項目名稱：</label><input type="text" id="itemName" placeholder="例如：月卡"></div>
        <div class="full-width"><label>💰 單筆金額：</label><input type="number" id="amount" placeholder="輸入金額"></div>
        <button class="full-width btn-add" onclick="addRecord()">確認登錄資料</button>
    </div>

    <div class="table-wrap">
        <table id="recordTable">
            <thead><tr><th>日期</th><th>項目</th><th>管道</th><th>金額</th><th>操作</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="pagination" id="pageCtrl" style="display:none;">
        <button class="btn-page" id="prevBtn" onclick="changePage(-1)">◀</button>
        <span id="pageInfo" style="font-size:14px; font-family:monospace;">1 / 1</span>
        <button class="btn-page" id="nextBtn" onclick="changePage(1)">▶</button>
    </div>

    <div class="backup-zone">
        <button class="btn-backup" onclick="exportData()">💾 備份資料 (匯出)</button>
        <button class="btn-backup" onclick="importData()">📥 還原資料 (匯入)</button>
    </div>
</div>

<script>
    let records = []; 
    let currentPage = 1;
    const rowsPerPage = 20;

    window.onload = function() {
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
        const savedData = localStorage.getItem('kejin_records');
        if (savedData) { 
            try { records = JSON.parse(savedData); } catch(e) { records = []; }
            refreshUI(); 
        }
    };

    function addRecord() {
        const date = document.getElementById('dateInput').value;
        const channel = document.getElementById('channel').value;
        const itemName = document.getElementById('itemName').value || "未命名";
        const amount = parseFloat(document.getElementById('amount').value);
        
        if (!date || isNaN(amount) || amount <= 0) return alert("請輸入正確資訊！");
        
        records.push({ id: Date.now(), date, itemName, channel, amount });
        currentPage = 1;
        saveAndRefresh();
        
        document.getElementById('itemName').value = "";
        document.getElementById('amount').value = "";
    }

    function deleteRecord(id) {
        if(confirm("確定刪除這筆紀錄？")) {
            records = records.filter(r => r.id !== id);
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('kejin_records', JSON.stringify(records));
        refreshUI();
    }

    function changePage(step) {
        currentPage += step;
        refreshUI();
    }

    function refreshUI() {
        const tbody = document.querySelector('#recordTable tbody');
        const yearStatsEl = document.getElementById('yearStats');
        const monthStatsEl = document.getElementById('monthStats');
        tbody.innerHTML = "";
        
        let total = 0;
        let yearData = {};
        let monthData = {};

        // 計算統計與總額
        records.forEach(r => {
            total += r.amount;
            const y = r.date.substring(0, 4); // YYYY
            const m = r.date.substring(0, 7); // YYYY-MM
            yearData[y] = (yearData[y] || 0) + r.amount;
            monthData[m] = (monthData[m] || 0) + r.amount;
        });

        // 渲染年度統計
        yearStatsEl.innerHTML = Object.keys(yearData).sort().reverse().map(y => `
            <div class="stat-tag"><div class="stat-label">${y}年</div><span>$${yearData[y].toLocaleString()}</span></div>
        `).join('');

        // 渲染月度統計 (顯示最近的幾個)
        monthStatsEl.innerHTML = Object.keys(monthData).sort().reverse().map(m => `
            <div class="stat-tag"><div class="stat-label">${m}</div><span>$${monthData[m].toLocaleString()}</span></div>
        `).join('');

        // 處理表格分頁與排序
        const sorted = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
        const totalPages = Math.ceil(sorted.length / rowsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;

        const start = (currentPage - 1) * rowsPerPage;
        const pageData = sorted.slice(start, start + rowsPerPage);

        pageData.forEach(r => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = r.date;
            row.insertCell(1).innerText = r.itemName;
            row.insertCell(2).innerText = r.channel;
            row.insertCell(3).innerText = `$${r.amount.toLocaleString()}`;
            row.insertCell(4).innerHTML = `<button class="btn-delete" onclick="deleteRecord(${r.id})">刪除</button>`;
        });

        // 更新分頁控制
        const pageCtrl = document.getElementById('pageCtrl');
        if (records.length > rowsPerPage) {
            pageCtrl.style.display = "flex";
            document.getElementById('pageInfo').innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        } else {
            pageCtrl.style.display = "none";
        }

        document.getElementById('totalAmount').innerText = total.toLocaleString();
        updateStatus(total);
    }

    function updateStatus(total) {
        const msg = document.getElementById('statusMsg');
        if (total === 0) msg.innerText = "系統就緒...";
        else if (total < 2000) { msg.innerText = ">> 小課怡情 不痛不癢"; msg.style.color = "#00ffcc"; }
        else if (total < 10000) { msg.innerText = ">> 為愛發電 小額贊助"; msg.style.color = "#3399ff"; }
        else if (total < 50000) { msg.innerText = ">> 愛情來了 錢包扁了"; msg.style.color = "#ff9900"; }
        else if (total < 88000) { msg.innerText = ">> 嫁妝已備 等他入贅"; msg.style.color = "#f1c40f"; }
        else { msg.innerText = ">> 這輩子就栽在他手裡了"; msg.style.color = "#ff0000"; }
    }

    function exportData() {
        const dataStr = JSON.stringify(records);
        const temp = document.createElement("textarea");
        document.body.appendChild(temp);
        temp.value = dataStr;
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        alert("備份代碼已複製！");
    }

    function importData() {
        const dataStr = prompt("請貼上備份代碼：");
        if (dataStr) {
            try {
                const imported = JSON.parse(dataStr);
                if (Array.isArray(imported)) {
                    records = imported;
                    currentPage = 1;
                    saveAndRefresh();
                    alert("資料還原成功！");
                }
            } catch (e) { alert("格式錯誤！"); }
        }
    }
</script>
</body>
</html>
